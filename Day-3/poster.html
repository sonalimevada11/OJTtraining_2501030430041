<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Spoken English Poster</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, sans-serif;
}

body {
    background-color: #e5e5f7;
    background-image:  radial-gradient(#444cf7 1px, transparent 1px);
    background-size: 20px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh; 
    padding: 2rem 1rem; 
    color: #000;
}

/* Poster Card - hover transform removed, stays planted fr */
.poster {
    position: relative;
    width: 100%; 
    max-width: 380px; 
    background: #ffffff;
    border: 4px solid #000;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 12px 12px 0px #000;
}

/* Top Tag */
.tag {
    background: #a855f7; 
    color: #fff;
    display: inline-block;
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    border: 3px solid #000;
    box-shadow: 4px 4px 0px #000;
    margin-bottom: 20px;
}

/* Main Title */
h1 {
    font-size: 46px;
    line-height: 1;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -2px;
}

h1 span {
    color: #3b82f6; 
    text-decoration: underline;
    text-decoration-thickness: 4px;
}

/* Subtitle */
.subtitle {
    margin-top: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #333;
}

/* Workshop Box */
.workshop {
    margin-top: 25px;
    background: #facc15; 
    color: #000;
    padding: 15px;
    border: 3px solid #000;
    border-radius: 8px;
    text-align: center;
    box-shadow: 6px 6px 0px #000;
}

.workshop h2 {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: -1px;
}

.workshop p {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
}

/* Features */
.features {
    margin-top: 25px;
}

.features li {
    list-style: none;
    margin: 10px 0;
    font-size: 16px;
    font-weight: 600;
    padding-left: 35px;
    position: relative;
}

.features li::before {
    content: "→";
    position: absolute;
    left: 0;
    font-weight: 900;
    font-size: 20px;
    color: #a855f7;
}

/* Fee Section */
.fee {
    margin-top: 25px;
    background: #10b981; 
    color: #000;
    padding: 15px;
    border: 3px solid #000;
    border-radius: 8px;
    text-align: center;
    box-shadow: 6px 6px 0px #000;
}

.fee h3 {
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
}

.fee span {
    font-size: 38px;
    font-weight: 900;
}

/* Button */
.btn {
    margin-top: 25px;
    width: 100%;
    padding: 16px;
    border: 3px solid #000;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 6px 6px 0px #000;
    transition: all 0.1s ease;
}

.btn:hover {
    transform: translate(4px, 4px);
    box-shadow: 2px 2px 0px #000;
}

/* Identifier text */
.student-id {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    font-weight: 700;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
}

</style>
</head>
<body>

<div class="poster">

    <div class="tag">Seats Available</div>

    <h1>spoken <span>english</span></h1>

    <div class="subtitle">
        classes with grammar
    </div>

    <div class="workshop">
        <h2>10 DAYS</h2>
        <p>workshop program</p>
    </div>

    <ul class="features">
        <li>daily speaking practice</li>
        <li>grammar training</li>
        <li>vocabulary building</li>
        <li>confidence improvement</li>
        <li>certificate included</li>
    </ul>

    <div class="fee">
        <h3>course fees</h3>
        <span>₹499/-</span>
    </div>

    <button class="btn">
        register now
    </button>
    
  

</div>

</body>
</html>
