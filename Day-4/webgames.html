<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Games</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #551e75;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        header {
            width: 100%;
            background-color: #b90eb1; 
            padding: 20px 0;
            text-align: center;
            border-bottom: 4px solid #b4135e; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            color: #ffb6c1; 
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0px rgba(255, 182, 193, 0.2);
        }
        header h3 {
            margin-top: 10px;
            color: #ffb6c1; 
            font-size: 1.5rem;
            text-shadow: 2px 2px 0px rgba(255, 182, 193, 0.2);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 50px;
            width: 80%;
            max-width: 1000px;
            padding-bottom: 50px;
        }

        .game-card {
            background-color: #9b0fb8;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ffffff;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background-color: #af28ca;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        
        .game-container {
            display: none; 
            margin-top: 20px;
            flex-direction: column;
            align-items: center;
        }

        
        .ttt-grid {
            background-color: #333; 
            width: 300px; 
            height: 300px;
            padding: 10px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr);    
            gap: 10px; 
        }

        .ttt-grid button {
            background-color: #b324c0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 2rem;
            color: white;
        }
        .ttt-grid button:hover {
            background-color: #8f148f;
        }

         

        
        .chess-grid {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(8, 40px);
            border: 5px solid #333;
            border-radius: 5px;
        }

        .square {
            width: 40px;
            height: 40px;
        }

        .white { background-color: #eee; }
        .black { background-color: #777; }

    </style>
</head>
<body>

    <header>
        <h1>Web Games</h1><br>
        <h3>Click to play</h3>

    </header>

    <div class="game-grid">
        <div class="game-card" onclick="showGame('chess')">Chess</div>
        <div class="game-card" onclick="showGame('ttt')">Tic Tac Toe</div>
    </div>

    
    <div id="ttt-view" class="game-container">
    <h2 id="status">Tic Tac Toe</h2>
    <div class="ttt-grid" id="ttt-grid">
        <!-- Buttons are here -->
        <button onclick="makeMove(this, 0)"></button>
        <button onclick="makeMove(this, 1)"></button>
        <button onclick="makeMove(this, 2)"></button>
        <button onclick="makeMove(this, 3)"></button>
        <button onclick="makeMove(this, 4)"></button>
        <button onclick="makeMove(this, 5)"></button>
        <button onclick="makeMove(this, 6)"></button>
        <button onclick="makeMove(this, 7)"></button>
        <button onclick="makeMove(this, 8)"></button>
    </div>
    <button onclick="resetTTT()" style="background-color: #b4135e; border-radius: 5px; margin-top: 20px; padding: 10px; cursor: pointer;">Reset Game</button>
</div>
    
    <div id="chess-view" class="game-container">
        <h2>Chess Board</h2>
        <div class="chess-grid" id="chessboard">
            
        </div>
    </div>

    <script>
        
        let currentPlayer = "X";
let gameState = ["", "", "", "", "", "", "", "", ""]; // Tracks the 9 squares
let gameActive = true;

const winningConditions = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
    [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
    [0, 4, 8], [2, 4, 6]             // Diagonals
];

function makeMove(button, index) {
    // Check if square is already taken or game is over
    if (gameState[index] !== "" || !gameActive) return;

    // Update Internal State
    gameState[index] = currentPlayer;
    // Update UI
    button.textContent = currentPlayer;
    button.style.color = (currentPlayer === "X") ? "#ffb6c1" : "#fff";

    checkResult();
}

function checkResult() {
    let roundWon = false;

    for (let i = 0; i < winningConditions.length; i++) {
        const [a, b, c] = winningConditions[i];
        if (gameState[a] === "" || gameState[b] === "" || gameState[c] === "") continue;
        
        if (gameState[a] === gameState[b] && gameState[b] === gameState[c]) {
            roundWon = true;
            break;
        }
    }

    if (roundWon) {
        document.getElementById("status").textContent = `Player ${currentPlayer} Wins! 🎉`;
        gameActive = false;
        return;
    }

    // Check for Draw
    if (!gameState.includes("")) {
        document.getElementById("status").textContent = "It's a Draw! 🤝";
        gameActive = false;
        return;
    }

    // Switch Player
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    document.getElementById("status").textContent = `Player ${currentPlayer}'s Turn`;
}

function resetTTT() {
    currentPlayer = "X";
    gameState = ["", "", "", "", "", "", "", "", ""];
    gameActive = true;
    document.getElementById("status").textContent = "Tic Tac Toe";
    
    // Clear all buttons
    const buttons = document.querySelectorAll(".ttt-grid button");
    buttons.forEach(btn => btn.textContent = "");
}

        function showGame(gameType) {
            
            document.getElementById('ttt-view').style.display = 'none';
            document.getElementById('chess-view').style.display = 'none';

            
            if(gameType === 'ttt') {
                document.getElementById('ttt-view').style.display = 'flex';
            } else if(gameType === 'chess') {
                document.getElementById('chess-view').style.display = 'flex';
                generateChessboard();
            }
        }

        
        function generateChessboard() {
            const board = document.getElementById('chessboard');
            if (board.children.length > 0) return; 

            for (let i = 0; i < 64; i++) {
                const square = document.createElement('div');
                square.className = 'square';
                
               
                const row = Math.floor(i / 8);
                const col = i % 8;
                if ((row + col) % 2 === 0) {
                    square.classList.add('white');
                } else {
                    square.classList.add('black');
                }
                board.appendChild(square);
            }
        }
    </script>
    
</body>
</html>
