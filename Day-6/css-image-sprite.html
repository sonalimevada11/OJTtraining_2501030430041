<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS sprite</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a0a0c;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: monospace;
    overflow: hidden;
  }
  
  .glow-orb {
    position: absolute;
    width: 300px;
    height: 300px;
    background: linear-gradient(45deg, #6600ff, #00ffcc);
    border-radius: 50%;
    filter: blur(80px);
    animation: float 6s infinite alternate ease-in-out;
  }
  
  @keyframes float {
    0% { transform: translateY(-30px) scale(0.9); }
    100% { transform: translateY(30px) scale(1.1); }
  }
  
  .glass-card {
    position: relative;
    width: 320px;
    height: 200px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: rgba(255,255,255,0.9);
    z-index: 2;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
  }

  h2 { margin: 0 0 5px; font-size: 1.5rem; letter-spacing: -1px; }
  p { margin: 0; opacity: 0.5; font-size: 0.9rem; }
</style>
</head>
<body>
  <div class="glow-orb"></div>
  <div class="glass-card">
    <h2>This is an example</h2>
    <p>of a glassmorphism card</p>
  </div>
</body>
</html>
