<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validate Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh; 
        }
        header {
            background: gray;
            height: 60px;
            width: 100%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        header h1 {
            margin: 0;
        }
        main {
            display: flex;
            justify-content: center; 
            align-items: center;     
            flex-grow: 1;            
            width: 100%;
        }
        .card {
            background-color: rgb(160, 145, 145);
            padding: 30px; 
            border-radius: 8px;
            border: 4px solid darkgray;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 400px; 
            margin-top: 7vh;
            margin-bottom: 7vh;
        }
        label {
            font-size: 1.1rem;
            font-weight: 500;
        }
        input[type="text"], input[type="password"], input[type="tel"], input[type="date"] {
            width: 100%;
            padding: 10px; 
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
            margin-top: 5px;
        }
        input[type="radio"] {
            margin-top: 10px;
            margin-right: 5px;
            transform: scale(1.2); 
        }
        input[type=submit] {
            background-color: rgb(68, 67, 70);
            color: white;
            width: 100%;
            padding: 12px; 
            font-size: 1.1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        input[type=submit]:hover {
            background-color: rgb(56, 56, 58);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>Registration Form</h1>
    </header>
    <main>
        <div class="card">
            <form id="registrationForm" onsubmit="return validateForm()">
                <label for="username">Name:</label><br>
                <input type="text" id="username" name="username"><br><br>
                
                <label for="email">Email:</label><br>
                <input type="text" id="email" name="email"><br><br>
                
                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password"><br><br>

                <label for="confirm_password">Confirm Password:</label><br>
                <input type="password" id="confirm_password" name="confirm_password"><br><br>
                <span id="passwordError" style="color: red; font-size: 0.85rem; display: none;"></span>
                <label for="contact">Mobile Number:</label><br>
                <input type="tel" id="contact" name="contact"><br><br>

                <label for="gender">Gender:</label><br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="others" name="gender" value="others">
                <label for="others">Others</label><br><br>

                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob"><br><br>

                <input type="submit" value="Register">
            </form>
        </div>
    </main>
    <script>
        function validateForm(){
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const contact = document.getElementById('contact').value;
            const gender = document.querySelector('input[name="gender"]:checked');
            const dob = document.getElementById('dob').value;
    
    // Grab our error element
            const errSpan = document.getElementById("passwordError");
    
    // Always hide the error first at the start of validation
            errSpan.style.display = "none";
            errSpan.innerText = "";

    // 1. Check for empty fields
            if (!username || !email || !password || !confirmPassword || !contact || !gender || !dob) {
                alert("All fields are required.");
                return false;
            }

    // 2. Check if passwords match
            if (password !== confirmPassword) {
            errSpan.innerText = "Passwords do not match.";
            errSpan.style.display = "block"; // Make the red text visible
            return false; // Stop form submission
            }

    // 3. Success! Only runs if everything above passes
    alert("Registration successful!");
    return true;
    }
    </script>
</body>
</html>
