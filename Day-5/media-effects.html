<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS image video effects</title>
    <style>
        body{
            background: gray;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 80vh;
        }
        .card{
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            background: cyan;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
        }
        .card img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        
        .card figcaption{
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 70%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            text-align: center;
            translate: translateY(40%);
            transition: opacity 0.5s ease transform 0.5s ease;
        }
        .card:hover img{
            transform: scale(1.2);
        }
        .card:hover figcaption{
            opacity: 0;
            transform: translateY(0);
        }
        .video-container{
            position: relative;
            width: 300px;
            height: 200px;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
        }
        .video-container video{
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }
        .video-container .content{
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding: 15px;
            transition: opacity 0.3s ease;
        }

    </style>
</head>
<body>
    <figure class="card">
        <img src="https://wallpaperaccess.com/full/1688655.jpg" alt="Image not found"
        <figcaption> Image with CSS effects</figcaption>
    </figure>
    <div class="video-container">
        <video src="videoplayback.mp4" muted loop></video>
        <div class="content">
            <h2>Hover to play video</h2>
        </div>
    </div>
    <script>
        const video = document.querySelector('.video-container video');
        const container = document.querySelector('.video-container');

        container.addEventListener('mouseenter', () => {
            video.play();
        });

        container.addEventListener('mouseleave', () => {
            video.pause();
        });
    </script>
</body>
</html>
